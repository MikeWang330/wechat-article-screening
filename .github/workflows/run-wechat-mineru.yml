name: Run WeChat Research and MinerU

on:
  workflow_dispatch:
    inputs:
      topic:
        description: "Research topic or keyword"
        required: true
        type: string
      count:
        description: "Number of final articles"
        required: true
        default: "20"
        type: string
      pool_size:
        description: "Candidate pool size. Use 0 for count * 2"
        required: false
        default: "0"
        type: string
      focus:
        description: "Screening mode"
        required: true
        default: "auto"
        type: choice
        options:
          - auto
          - general
          - marketing
      extra_keywords:
        description: "Extra keywords, optional"
        required: false
        default: ""
        type: string
      start_date:
        description: "Start date YYYY-MM-DD, optional"
        required: false
        default: ""
        type: string
      end_date:
        description: "End date YYYY-MM-DD, optional"
        required: false
        default: ""
        type: string
      run_mineru:
        description: "Run MinerU parsing after URL research"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      min_delay:
        description: "Minimum random browser delay in seconds"
        required: false
        default: "2"
        type: string
      max_delay:
        description: "Maximum random browser delay in seconds"
        required: false
        default: "6"
        type: string

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      MINERU_TOKEN: ${{ secrets.MINERU_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Search, screen, and resolve WeChat URLs
        shell: bash
        run: |
          set -euo pipefail

          args=(
            "wechat_research.py"
            "--topic" "${{ inputs.topic }}"
            "--count" "${{ inputs.count }}"
            "--focus" "${{ inputs.focus }}"
            "--pool-size" "${{ inputs.pool_size }}"
            "--min-delay" "${{ inputs.min_delay }}"
            "--max-delay" "${{ inputs.max_delay }}"
            "--write-urls"
          )

          if [ -n "${{ inputs.extra_keywords }}" ]; then
            args+=("--extra-keywords" "${{ inputs.extra_keywords }}")
          fi
          if [ -n "${{ inputs.start_date }}" ]; then
            args+=("--start-date" "${{ inputs.start_date }}")
          fi
          if [ -n "${{ inputs.end_date }}" ]; then
            args+=("--end-date" "${{ inputs.end_date }}")
          fi

          xvfb-run -a python "${args[@]}"

      - name: Parse with MinerU
        if: ${{ inputs.run_mineru == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${MINERU_TOKEN:-}" ]; then
            echo "MINERU_TOKEN secret is required when run_mineru=true."
            echo "Set it in GitHub: Settings > Secrets and variables > Actions > New repository secret."
            exit 1
          fi
          python mineru_batch_wechat.py --urls urls.txt --submit-source html-file

      - name: Upload local results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: wechat-mineru-results-${{ github.run_id }}
          retention-days: 14
          if-no-files-found: warn
          path: |
            urls.txt
            candidates/
            runs/
            library/articles_index.csv
            latest_run.txt
