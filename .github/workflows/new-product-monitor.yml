name: New Product Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * 1-5"

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate cloud-safe discovery data
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: |
          python new_product_monitor.py --cloud-safe --push-feishu

      - name: Commit discovery data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/new_product_discoveries.json
          git diff --cached --quiet || git commit -m "Update new product discoveries"
          git push
